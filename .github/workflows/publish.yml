name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.target_commitish }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Derive package directory from tag
        id: pkg
        run: |
          NAME="${GITHUB_REF_NAME%-v*}"
          case "$NAME" in
            api)       DIR="realm-api" ;;
            browser)   DIR="realm-browser" ;;
            cli)       DIR="realm-cli" ;;
            container) DIR="realm-container" ;;
            core)      DIR="realm-core" ;;
            ubuntu)    DIR="realm-ubuntu" ;;
            veil)      DIR="realm-veil" ;;
            *)
              echo "::error::Unknown package prefix '$NAME' in tag $GITHUB_REF_NAME"
              exit 1
              ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Exchange OIDC token and publish
        env:
          PKG_DIR: ${{ steps.pkg.outputs.dir }}
        run: |
          # Get package name from package.json
          PKG_NAME=$(node -p "require('./packages/$PKG_DIR/package.json').name")
          echo "Publishing $PKG_NAME from packages/$PKG_DIR"

          # 1. Get GitHub OIDC id_token
          JWT=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).value")

          # 2. Exchange for a short-lived npm token (scoped to this package)
          NPM_TOKEN=$(curl -sS -X POST \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/$(node -p "encodeURIComponent('$PKG_NAME')")" \
            -H "Authorization: Bearer $JWT" \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).token")

          # 3. pnpm reads NPM_TOKEN env var for auth
          export NPM_TOKEN
          pnpm publish --filter "./packages/$PKG_DIR" --no-git-checks
